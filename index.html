<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Project - YE AI-</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<style>
:root{
    --bg:#0f0f0f;
    --sidebar:#171717;
    --panel:#212121;
    --border:#303030;
    --text:#ececec;
    --muted:#9ca3af;
    --accent:#10a37f;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Inter,system-ui,sans-serif;
    background:var(--bg);
    color:var(--text);
    height:100vh;
    overflow:hidden;
}

.app{
    display:flex;
    height:100vh;
}

.sidebar{
    width:260px;
    background:var(--sidebar);
    border-right:1px solid var(--border);
    display:flex;
    flex-direction:column;
}

.new-chat{
    margin:12px;
    padding:12px;
    border:none;
    border-radius:12px;
    background:#2a2a2a;
    color:white;
    cursor:pointer;
    font-weight:600;
}

.new-chat:hover{
    background:#333;
}

.chat-list{
    flex:1;
    overflow:auto;
    padding:8px;
}

.chat-item{
    padding:10px;
    border-radius:10px;
    color:#ccc;
    cursor:pointer;
}

.chat-item:hover{
    background:#242424;
}

.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

.header{
    height:60px;
    border-bottom:1px solid var(--border);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
}

.model{
    color:var(--muted);
    font-size:14px;
}

.chat{
    flex:1;
    overflow-y:auto;
    padding:30px;
}

.message{
    max-width:900px;
    margin:auto;
    display:flex;
    gap:15px;
    margin-bottom:30px;
}

.avatar{
    width:38px;
    height:38px;
    border-radius:50%;
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
}

.user-avatar{
    background:#10a37f;
}

.bot-avatar{
    background:#7c3aed;
}

.content{
    flex:1;
    line-height:1.7;
}

.content p{
    margin-bottom:12px;
}

.content pre{
    background:#111;
    border-radius:12px;
    padding:16px;
    overflow-x:auto;
}

.content code{
    font-family:monospace;
}

.input-wrap{
    padding:20px;
}

.input-box{
    max-width:900px;
    margin:auto;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:20px;
    padding:12px;
    display:flex;
    gap:10px;
}

textarea{
    flex:1;
    background:none;
    border:none;
    color:white;
    resize:none;
    outline:none;
    font-size:16px;
    max-height:200px;
}

.send{
    background:var(--accent);
    color:white;
    border:none;
    border-radius:12px;
    padding:10px 18px;
    cursor:pointer;
}

.cursor{
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

@media(max-width:800px){

.sidebar{
    display:none;
}

.chat{
    padding:15px;
}

}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">
<button class="new-chat" onclick="newChat()">
+ New Chat
</button>

<div class="chat-list" id="chatList"></div>
</div>

<div class="main">

<div class="header">
<div>LM Studio Chat</div>
<div class="model" id="modelName">
Loading model...
</div>
</div>

<div id="chat" class="chat"></div>

<div class="input-wrap">

<div class="input-box">

<textarea
id="message"
rows="1"
placeholder="Message..."
></textarea>

<button
class="send"
onclick="sendMessage()">
Send
</button>

</div>

</div>

</div>

</div>

<script>

const API_BASE =
"http://192.168.50.204:1234/v1";

let currentModel = "";
let messages = [
{
role:"system",
content:"You are a helpful assistant."
}
];

const chat =
document.getElementById("chat");

const textarea =
document.getElementById("message");

async function loadModel(){

try{

const res =
await fetch(API_BASE + "/models");

const data =
await res.json();

currentModel =
data.data[0].id;

document.getElementById(
"modelName"
).textContent = currentModel;

}catch{

document.getElementById(
"modelName"
).textContent =
"Model unavailable";

}

}

function addMessage(role,text){

const div =
document.createElement("div");

div.className =
"message";

div.innerHTML = `
<div class="avatar ${
role==="user"
? "user-avatar"
: "bot-avatar"
}">
${role==="user" ? "U" : "AI"}
</div>

<div class="content">
${marked.parse(text)}
</div>
`;

chat.appendChild(div);

chat.scrollTop =
chat.scrollHeight;

return div;

}

textarea.addEventListener(
"keydown",
e=>{

if(
e.key==="Enter"
&& !e.shiftKey
){

e.preventDefault();

sendMessage();

}

}
);

async function sendMessage(){

const text =
textarea.value.trim();

if(!text) return;

textarea.value="";

addMessage(
"user",
text
);

messages.push({
role:"user",
content:text
});

const bot =
addMessage(
"assistant",
"▌"
);

const content =
bot.querySelector(
".content"
);

let full = "";

try{

const response =
await fetch(
API_BASE +
"/chat/completions",
{
method:"POST",
headers:{
"Content-Type":
"application/json"
},
body:JSON.stringify({
model:currentModel,
messages,
stream:true,
temperature:0.7
})
}
);

const reader =
response.body.getReader();

const decoder =
new TextDecoder();

while(true){

const {
value,
done
}
=
await reader.read();

if(done) break;

const chunk =
decoder.decode(value);

const lines =
chunk.split("\n");

for(
const line
of lines
){

if(
!line.startsWith(
"data:"
)
)
continue;

const data =
line.replace(
"data:",
""
).trim();

if(
data==="[DONE]"
)
continue;

try{

const json =
JSON.parse(data);

const token =
json.choices?.[0]
?.delta?.content;

if(token){

full += token;

content.innerHTML =
marked.parse(
full + "▌"
);

chat.scrollTop =
chat.scrollHeight;

}

}catch{}

}

}

content.innerHTML =
marked.parse(full);

messages.push({
role:"assistant",
content:full
});

saveChat();

document
.querySelectorAll(
"pre code"
)
.forEach(
el=>
hljs.highlightElement(el)
);

}catch(err){

content.innerHTML =
"Connection failed.";

console.error(err);

}

}

function saveChat(){

localStorage.setItem(
"lmstudio-chat",
JSON.stringify(
messages
)
);

}

function loadChat(){

const saved =
localStorage.getItem(
"lmstudio-chat"
);

if(!saved)
return;

messages =
JSON.parse(saved);

for(
const msg
of messages
){

if(
msg.role==="system"
)
continue;

addMessage(
msg.role,
msg.content
);

}

}

function newChat(){

messages = [
{
role:"system",
content:
"You are a helpful assistant."
}
];

chat.innerHTML = "";

localStorage.removeItem(
"lmstudio-chat"
);

}

loadModel();
loadChat();

</script>

</body>
</html>
```
