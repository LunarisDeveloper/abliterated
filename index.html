<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local AI Chatroom</title>
    <!-- Import Premium Custom Font -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { display: flex; background-color: #212121; color: #ececf1; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background-color: #171717; padding: 10px; display: flex; flex-direction: column; justify-content: space-between; border-right: 1px solid #2f2f2f; }
        .new-chat-btn { border: 1px solid #4d4d4d; background: transparent; color: white; padding: 12px; border-radius: 5px; cursor: pointer; font-size: 14px; width: 100%; text-align: left; font-weight: 500; }
        .new-chat-btn:hover { background-color: #2a2a2a; }
        .server-status { font-size: 12px; color: #8e8e93; padding: 10px; border-top: 1px solid #2f2f2f; }
        .chat-container { flex: 1; display: flex; flex-direction: column; height: 100%; position: relative; }
        .chat-box { flex: 1; overflow-y: auto; padding: 40px 20% 120px 20%; display: flex; flex-direction: column; gap: 20px; }
        .message { display: flex; padding: 15px; border-radius: 8px; max-width: 85%; line-height: 1.6; font-size: 15px; }
        .user-message { background-color: #2f2f2f; align-self: flex-end; color: white; font-weight: 400; }
        .ai-message { background-color: transparent; align-self: flex-start; color: #ececf1; font-weight: 400; }
        .input-area { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px 20%; background: linear-gradient(transparent, #212121 20%); }
        .input-wrapper { display: flex; background-color: #2f2f2f; border: 1px solid #424242; border-radius: 12px; padding: 10px; }
        textarea { flex: 1; background: transparent; border: none; color: white; resize: none; outline: none; font-size: 15px; max-height: 200px; }
        button#send-btn { background-color: #676767; color: #171717; border: none; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        button#send-btn:hover { background-color: white; }
    </style>
</head>
<body>
    <div class="sidebar">
        <button class="new-chat-btn" onclick="clearChat()">+ New chat</button>
        <div class="server-status">Host: http://localhost:1234</div>
    </div>
    <div class="chat-container">
        <div class="chat-box" id="chatBox">
            <div class="message ai-message">Hello! I am connected to your local LM Studio server. How can I help you today?</div>
        </div>
        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="userInput" placeholder="Message Local AI..." rows="1"></textarea>
                <button id="send-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>
    <script>
        let conversationHistory = [];
        document.getElementById('userInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        async function sendMessage() {
            const inputField = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            const userText = inputField.value.trim();
            if (!userText) return;
            appendMessage(userText, 'user-message');
            inputField.value = '';
            conversationHistory.push({ role: "user", content: userText });
            const aiMessageDiv = appendMessage("Thinking...", 'ai-message');
            try {
                // Changed connection protocol string to resolve Mixed Content restriction rules
                const response = await fetch("http://localhost:1234/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        messages: conversationHistory,
                        temperature: 0.7,
                        max_tokens: -1,
                        stream: false
                    })
                });
                if (!response.ok) throw new Error("Server error");
                const data = await response.json();
                const aiResponse = data.choices.message.content;
                aiMessageDiv.innerText = aiResponse;
                conversationHistory.push({ role: "assistant", content: aiResponse });
            } catch (error) {
                aiMessageDiv.innerText = "Error: Connection blocked or failed. Please check your browser's Mixed Content security settings or run this file locally.";
                aiMessageDiv.style.color = "#ff4a4a";
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        function appendMessage(text, className) {
            const chatBox = document.getElementById('chatBox');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${className}`;
            messageDiv.innerText = text;
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            return messageDiv;
        }
        function clearChat() {
            document.getElementById('chatBox').innerHTML = `<div class="message ai-message">Fresh session started.</div>`;
            conversationHistory = [];
        }
    </script>
</body>
</html>
