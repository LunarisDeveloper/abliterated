<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YE AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark-dimmed.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1e1e20;
  --sidebar:#28282a;
  --sidebar-hover:#323234;
  --sidebar-active:#3a3a3c;
  --surface:#2c2c2e;
  --surface2:#3a3a3c;
  --border:rgba(255,255,255,0.07);
  --border-med:rgba(255,255,255,0.11);
  --text:#f2f2f7;
  --text2:rgba(242,242,247,0.55);
  --text3:rgba(242,242,247,0.3);
  --accent:#0a84ff;
  --red:#ff5f57;
  --amber:#febc2e;
  --green:#28c840;
  --font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --mono:'JetBrains Mono','SF Mono',monospace;
}
html,body{height:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px}

/* Window chrome */
.window{display:flex;height:100vh;border-radius:0;overflow:hidden}

/* Sidebar */
.sidebar{
  width:240px;flex-shrink:0;
  background:var(--sidebar);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  user-select:none;
}

.titlebar{
  height:52px;display:flex;align-items:center;
  padding:0 16px;gap:8px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.tl{width:12px;height:12px;border-radius:50%;cursor:pointer;flex-shrink:0;transition:filter .15s}
.tl.r{background:var(--red)}.tl.a{background:var(--amber)}.tl.g{background:var(--green)}
.tl:hover{filter:brightness(1.2)}
.app-name{
  margin-left:6px;font-size:13px;font-weight:600;
  color:var(--text2);letter-spacing:-.02em;
}

.new-btn{
  margin:10px 10px 6px;
  padding:8px 12px;
  background:rgba(255,255,255,0.06);
  border:1px solid var(--border-med);
  border-radius:8px;
  color:var(--text2);
  font:500 13px/1 var(--font);
  cursor:pointer;display:flex;align-items:center;gap:7px;
  transition:background .12s,color .12s;
  letter-spacing:-.01em;
}
.new-btn:hover{background:rgba(255,255,255,0.1);color:var(--text)}
.new-btn svg{flex-shrink:0;opacity:.7}

.section-label{
  font-size:10.5px;font-weight:600;
  color:var(--text3);text-transform:uppercase;letter-spacing:.07em;
  padding:12px 16px 4px;
}

.chat-list{flex:1;overflow-y:auto;padding:0 6px 10px}
.chat-entry{
  padding:8px 10px;border-radius:7px;
  font-size:13px;color:var(--text2);
  cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  transition:background .1s,color .1s;margin-bottom:1px;
  display:flex;align-items:center;gap:8px;
}
.chat-entry:hover{background:var(--sidebar-hover);color:var(--text)}
.chat-entry.active{background:var(--sidebar-active);color:var(--text)}
.chat-entry .del{
  margin-left:auto;opacity:0;font-size:14px;color:var(--text3);
  flex-shrink:0;padding:0 2px;transition:opacity .1s;
}
.chat-entry:hover .del{opacity:1}
.chat-entry .del:hover{color:#ff453a}

.sidebar-footer{
  padding:12px;border-top:1px solid var(--border);
}
.model-pill{
  display:flex;align-items:center;gap:8px;
  padding:7px 10px;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);border-radius:7px;
}
.mdot{width:6px;height:6px;border-radius:50%;background:#30d158;flex-shrink:0;box-shadow:0 0 5px #30d158}
.mdot.err{background:#ff453a;box-shadow:0 0 5px #ff453a}
.mname{font-size:11px;font-family:var(--mono);color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}

.main-titlebar{
  height:52px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  background:rgba(30,30,32,.85);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  flex-shrink:0;
}
.conv-title{font-size:13px;font-weight:600;color:var(--text2);letter-spacing:-.01em}

/* Chat */
.chat-scroll{flex:1;overflow-y:auto;padding:28px 0 8px}

.empty-state{
  height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;
  color:var(--text3);
  animation:fu .4s ease;
}
.empty-icon{
  width:48px;height:48px;border-radius:12px;
  background:linear-gradient(135deg,#0a84ff,#5e5ce6);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:800;color:#fff;margin-bottom:4px;
}
.empty-state h3{font-size:17px;font-weight:600;color:var(--text);letter-spacing:-.03em}
.empty-state p{font-size:13.5px;color:var(--text2);max-width:280px;text-align:center;line-height:1.55}

/* Messages */
.msg-wrap{max-width:680px;margin:0 auto;padding:4px 28px;animation:fu .2s ease}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.msg-row{display:flex;gap:10px;align-items:flex-start}
.msg-row.user{flex-direction:row-reverse}

.av{
  width:28px;height:28px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;flex-shrink:0;
}
.av.u{background:rgba(255,255,255,0.1);color:var(--text2);border:1px solid var(--border-med)}
.av.a{background:linear-gradient(135deg,#0a84ff,#5e5ce6);color:#fff}

.bubble{font-size:14px;line-height:1.7;color:var(--text);max-width:calc(100% - 44px)}
.msg-row.user .bubble{
  background:#0a84ff;color:#fff;
  padding:9px 13px;border-radius:14px 14px 3px 14px;
  font-size:13.5px;
}
.msg-row.ai .bubble p{margin-bottom:10px}
.msg-row.ai .bubble p:last-child{margin-bottom:0}
.msg-row.ai .bubble pre{
  background:#18181a!important;border:1px solid var(--border);
  border-radius:10px;padding:14px 16px;margin:10px 0;overflow-x:auto;
}
.msg-row.ai .bubble code{font-family:var(--mono);font-size:12.5px}
.msg-row.ai .bubble :not(pre)>code{
  background:rgba(255,255,255,0.09);padding:2px 6px;border-radius:4px;font-size:13px
}
.msg-row.ai .bubble h1,.msg-row.ai .bubble h2,.msg-row.ai .bubble h3{
  font-weight:600;letter-spacing:-.02em;margin:14px 0 6px
}
.msg-row.ai .bubble ul,.msg-row.ai .bubble ol{padding-left:18px;margin-bottom:10px}
.msg-row.ai .bubble li{margin-bottom:3px}
.msg-row.ai .bubble blockquote{
  border-left:2px solid var(--accent);
  padding-left:12px;color:var(--text2);margin:10px 0;
}

.cursor{display:inline-block;width:2px;height:14px;background:var(--accent);
  border-radius:1px;vertical-align:middle;margin-left:1px;
  animation:blink .85s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* Input */
.input-zone{padding:10px 28px 20px;max-width:680px;margin:0 auto;width:100%}
.input-box{
  background:var(--surface);
  border:1px solid var(--border-med);
  border-radius:14px;
  display:flex;align-items:flex-end;gap:8px;
  padding:4px 6px 6px 14px;
  transition:border-color .18s,box-shadow .18s;
}
.input-box:focus-within{
  border-color:rgba(10,132,255,.45);
  box-shadow:0 0 0 3px rgba(10,132,255,.1);
}
textarea{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font:14px/1.6 var(--font);
  resize:none;padding:9px 0;max-height:150px;
  letter-spacing:-.01em;
}
textarea::placeholder{color:var(--text3)}
.send{
  width:32px;height:32px;border-radius:8px;
  background:var(--accent);border:none;
  color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;align-self:flex-end;margin-bottom:2px;
  transition:background .12s,transform .1s,opacity .15s;
}
.send:hover{background:#0070d8;transform:scale(1.05)}
.send:active{transform:scale(.95)}
.send:disabled{opacity:.35;cursor:not-allowed;transform:none}
.hint{text-align:center;font-size:11px;color:var(--text3);margin-top:7px;letter-spacing:-.01em}

.input-outer{display:flex;flex-direction:column;align-items:center;flex-shrink:0;padding:0 0 0}
</style>
</head>
<body>
<div class="window">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="titlebar">
      <div class="tl r" onclick="window.close()"></div>
      <div class="tl a"></div>
      <div class="tl g"></div>
      <span class="app-name">YE AI</span>
    </div>

    <button class="new-btn" onclick="newChat()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      New Chat
    </button>

    <div class="section-label">Recents</div>
    <div class="chat-list" id="chatList"></div>

    <div class="sidebar-footer">
      <div class="model-pill">
        <div class="mdot" id="mdot"></div>
        <div class="mname" id="mname">Connecting…</div>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="main-titlebar">
      <span class="conv-title" id="convTitle">New Conversation</span>
    </div>

    <div class="chat-scroll" id="chatScroll">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">Y</div>
        <h3>How can I help?</h3>
        <p>Start a conversation. I'll save each chat automatically.</p>
      </div>
    </div>

    <div class="input-outer">
      <div class="input-zone">
        <div class="input-box">
          <textarea id="inp" rows="1" placeholder="Message…"></textarea>
          <button class="send" id="sendBtn" onclick="send()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
          </button>
        </div>
        <div class="hint">Return to send &nbsp;·&nbsp; Shift+Return for new line</div>
      </div>
    </div>
  </div>
</div>

<script>
const API = "https://reconvene-crease-skintight.ngrok-free.dev/v1";
let model = "qwen2.5-coder-7b-instruct-abliterated";
let streaming = false;

// Chat sessions: [{id, title, messages}]
let sessions = JSON.parse(localStorage.getItem("ye-sessions") || "[]");
let activeId = null;

const chatScroll = document.getElementById("chatScroll");
const inp = document.getElementById("inp");
const sendBtn = document.getElementById("sendBtn");
const chatListEl = document.getElementById("chatList");
const emptyState = document.getElementById("emptyState");
const convTitle = document.getElementById("convTitle");

// ── Auto-grow textarea ──
inp.addEventListener("input", () => {
  inp.style.height = "auto";
  inp.style.height = Math.min(inp.scrollHeight, 150) + "px";
});
inp.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); if (!streaming) send(); }
});

// ── Session helpers ──
function getActive() { return sessions.find(s => s.id === activeId); }

function saveSessions() { localStorage.setItem("ye-sessions", JSON.stringify(sessions)); }

function newChat() {
  const id = Date.now().toString();
  sessions.unshift({ id, title: "New Chat", messages: [{ role:"system", content:"You are a helpful assistant." }] });
  saveSessions();
  activeId = id;
  renderSidebar();
  renderChat();
}

function loadSession(id) {
  activeId = id;
  renderSidebar();
  renderChat();
}

function deleteSession(id, e) {
  e.stopPropagation();
  sessions = sessions.filter(s => s.id !== id);
  saveSessions();
  if (activeId === id) {
    activeId = sessions[0]?.id || null;
  }
  renderSidebar();
  renderChat();
}

function renderSidebar() {
  chatListEl.innerHTML = "";
  if (sessions.length === 0) return;
  for (const s of sessions) {
    const div = document.createElement("div");
    div.className = "chat-entry" + (s.id === activeId ? " active" : "");
    div.innerHTML = `<span style="overflow:hidden;text-overflow:ellipsis;flex:1">${esc(s.title)}</span><span class="del" onclick="deleteSession('${s.id}',event)">✕</span>`;
    div.addEventListener("click", () => loadSession(s.id));
    chatListEl.appendChild(div);
  }
}

function renderChat() {
  // clear everything except emptyState
  Array.from(chatScroll.children).forEach(c => { if (c !== emptyState) c.remove(); });
  const sess = getActive();
  if (!sess) {
    emptyState.style.display = "";
    convTitle.textContent = "New Conversation";
    return;
  }
  convTitle.textContent = sess.title;
  const userMsgs = sess.messages.filter(m => m.role !== "system");
  if (userMsgs.length === 0) { emptyState.style.display = ""; return; }
  emptyState.style.display = "none";
  for (const m of userMsgs) renderBubble(m.role, m.content, false);
  document.querySelectorAll("pre code").forEach(el => hljs.highlightElement(el));
  chatScroll.scrollTop = chatScroll.scrollHeight;
}

function renderBubble(role, text, animate=true) {
  if (emptyState.style.display !== "none") emptyState.style.display = "none";
  const wrap = document.createElement("div");
  wrap.className = "msg-wrap";
  if (!animate) wrap.style.animation = "none";
  const isUser = role === "user";
  const html = isUser ? `<span>${esc(text)}</span>` : marked.parse(text);
  wrap.innerHTML = `
    <div class="msg-row ${isUser ? "user" : "ai"}">
      <div class="av ${isUser ? "u" : "a"}">${isUser ? "U" : "AI"}</div>
      <div class="bubble">${html}</div>
    </div>`;
  chatScroll.appendChild(wrap);
  chatScroll.scrollTop = chatScroll.scrollHeight;
  return wrap.querySelector(".bubble");
}

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ── Send ──
async function send() {
  const text = inp.value.trim();
  if (!text || streaming) return;
  inp.value = ""; inp.style.height = "auto";

  // Create session if none active
  if (!activeId) newChat();
  const sess = getActive();

  sess.messages.push({ role:"user", content:text });
  if (sess.title === "New Chat") {
    sess.title = text.slice(0, 36) + (text.length > 36 ? "…" : "");
    convTitle.textContent = sess.title;
    renderSidebar();
  }
  saveSessions();
  renderBubble("user", text);

  streaming = true;
  sendBtn.disabled = true;
  const aiBubble = renderBubble("assistant", "");
  aiBubble.innerHTML = '<span class="cursor"></span>';
  let full = "";

  try {
    const res = await fetch(API + "/chat/completions", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ model, messages:sess.messages, stream:true, temperature:0.7 })
    });
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    while (true) {
      const {value, done} = await reader.read();
      if (done) break;
      for (const line of dec.decode(value).split("\n")) {
        if (!line.startsWith("data:")) continue;
        const d = line.slice(5).trim();
        if (d === "[DONE]") continue;
        try {
          const tok = JSON.parse(d)?.choices?.[0]?.delta?.content;
          if (tok) {
            full += tok;
            aiBubble.innerHTML = marked.parse(full) + '<span class="cursor"></span>';
            chatScroll.scrollTop = chatScroll.scrollHeight;
          }
        } catch {}
      }
    }
    aiBubble.innerHTML = marked.parse(full);
    sess.messages.push({ role:"assistant", content:full });
    saveSessions();
    document.querySelectorAll("pre code").forEach(el => hljs.highlightElement(el));
  } catch {
    aiBubble.innerHTML = '<span style="color:#ff453a;font-size:13px;">⚠ Connection failed. Is LM Studio running?</span>';
  } finally {
    streaming = false;
    sendBtn.disabled = false;
  }
}

// ── Model load ──
async function loadModel() {
  try {
    const r = await fetch(API + "/models");
    const d = await r.json();
    model = d.data[0].id;
    document.getElementById("mname").textContent = model;
  } catch {
    document.getElementById("mname").textContent = "Model unavailable";
    document.getElementById("mdot").classList.add("err");
  }
}

// ── Init ──
loadModel();
if (sessions.length > 0) {
  activeId = sessions[0].id;
  renderSidebar();
  renderChat();
} else {
  renderSidebar();
}
</script>
</body>
</html>
