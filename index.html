<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YE AI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark-dimmed.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg: #1c1c1e;
  --sidebar-bg: #2c2c2e;
  --surface: #3a3a3c;
  --surface-hover: #48484a;
  --border: rgba(255,255,255,0.08);
  --border-subtle: rgba(255,255,255,0.05);
  --text: #f5f5f7;
  --text-secondary: rgba(245,245,247,0.55);
  --text-tertiary: rgba(245,245,247,0.35);
  --accent: #0a84ff;
  --accent-dim: rgba(10,132,255,0.15);
  --user-bubble: #0a84ff;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
  --sidebar-w: 260px;
}

html,body{height:100%;overflow:hidden}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  letter-spacing: -0.01em;
}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.22)}

/* Layout */
.shell{display:flex;height:100vh}

/* Sidebar */
.sidebar {
  width: var(--sidebar-w);
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.sidebar-top {
  padding: 16px 12px 12px;
  border-bottom: 1px solid var(--border-subtle);
}

.traffic-lights {
  display: flex;
  gap: 7px;
  margin-bottom: 16px;
  padding-left: 4px;
}

.dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  cursor: pointer;
  transition: filter 0.15s;
}
.dot.red   { background: #ff5f57; }
.dot.amber { background: #febc2e; }
.dot.green { background: #28c840; }
.dot:hover { filter: brightness(1.15); }

.brand {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.02em;
  padding: 0 4px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.brand-icon {
  width: 24px;
  height: 24px;
  background: var(--accent);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  color: #fff;
}

.new-chat {
  width: 100%;
  padding: 9px 12px;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  color: var(--text);
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 7px;
  transition: background 0.15s, border-color 0.15s;
  letter-spacing: -0.01em;
}
.new-chat:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.15)}
.new-chat svg{opacity:0.7}

.sidebar-section {
  padding: 12px 12px 4px;
}
.sidebar-section-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 0 4px;
  margin-bottom: 4px;
}

.chat-list{flex:1;overflow-y:auto;padding:0 8px 12px}

.chat-item {
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 13px;
  font-weight: 400;
  transition: background 0.12s, color 0.12s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 1px;
}
.chat-item:hover{background:rgba(255,255,255,0.07);color:var(--text)}
.chat-item.active{background:rgba(10,132,255,0.15);color:var(--accent)}

.sidebar-footer {
  padding: 12px;
  border-top: 1px solid var(--border-subtle);
}
.model-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
}
.model-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #30d158;
  box-shadow: 0 0 6px #30d158;
  flex-shrink: 0;
}
.model-name {
  font-size: 11.5px;
  font-family: var(--font-mono);
  color: var(--text-secondary);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* Toolbar */
.toolbar {
  height: 52px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  background: rgba(28,28,30,0.8);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  flex-shrink: 0;
  z-index: 10;
}
.toolbar-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.02em;
}
.toolbar-actions{display:flex;gap:8px}
.toolbar-btn {
  width: 30px;
  height: 30px;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.12s, color 0.12s;
}
.toolbar-btn:hover{background:rgba(255,255,255,0.1);color:var(--text)}

/* Chat */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 32px 0 16px;
  scroll-behavior: smooth;
}

/* Welcome */
.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 12px;
  padding: 40px;
  text-align: center;
  color: var(--text-secondary);
  animation: fadeUp 0.5s ease forwards;
}
.welcome-icon {
  width: 52px;
  height: 52px;
  background: linear-gradient(135deg, var(--accent), #5e5ce6);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  font-weight: 800;
  color: #fff;
  margin-bottom: 8px;
}
.welcome h2{font-size:20px;font-weight:600;color:var(--text);letter-spacing:-0.03em}
.welcome p{font-size:14px;line-height:1.6;max-width:340px}

/* Messages */
.msg-group {
  max-width: 720px;
  margin: 0 auto;
  padding: 6px 24px;
  animation: fadeUp 0.25s ease forwards;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}

.msg-row{display:flex;gap:12px;align-items:flex-start}
.msg-row.user{flex-direction:row-reverse}

.avatar {
  width: 30px;
  height: 30px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
  letter-spacing: -0.02em;
}
.ai-avatar{background:linear-gradient(135deg,#0a84ff,#5e5ce6);color:#fff}
.user-avatar{background:rgba(255,255,255,0.1);color:var(--text-secondary);border:1px solid var(--border)}

.bubble {
  max-width: calc(100% - 54px);
  font-size: 14.5px;
  line-height: 1.7;
  color: var(--text);
}

.user .bubble {
  background: var(--user-bubble);
  color: #fff;
  padding: 10px 14px;
  border-radius: 16px 16px 4px 16px;
  font-size: 14px;
}

.ai .bubble {
  color: var(--text);
}

.ai .bubble p{margin-bottom:12px}
.ai .bubble p:last-child{margin-bottom:0}

.ai .bubble pre {
  background: #1a1a1e !important;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 14px 16px;
  margin: 12px 0;
  overflow-x: auto;
  font-size: 12.5px;
}
.ai .bubble code{font-family:var(--font-mono)}
.ai .bubble :not(pre)>code{
  background:rgba(255,255,255,0.08);
  padding:2px 6px;
  border-radius:5px;
  font-size:13px;
}
.ai .bubble h1,.ai .bubble h2,.ai .bubble h3{
  font-weight:600;letter-spacing:-0.02em;margin:16px 0 8px;
}
.ai .bubble ul,.ai .bubble ol{padding-left:20px;margin-bottom:12px}
.ai .bubble li{margin-bottom:4px}
.ai .bubble blockquote{
  border-left:3px solid var(--accent);
  padding-left:12px;
  color:var(--text-secondary);
  margin:12px 0;
}

/* Typing cursor */
.cursor{display:inline-block;width:2px;height:15px;background:var(--accent);border-radius:1px;vertical-align:middle;margin-left:2px;animation:blink 0.9s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* Input */
.input-area {
  padding: 12px 24px 20px;
  flex-shrink: 0;
}
.input-card {
  max-width: 720px;
  margin: 0 auto;
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-xl);
  overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.input-card:focus-within{
  border-color: rgba(10,132,255,0.5);
  box-shadow: 0 0 0 3px rgba(10,132,255,0.1);
}
.input-inner{display:flex;align-items:flex-end;padding:4px 4px 4px 16px;gap:8px}

textarea {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.6;
  resize: none;
  padding: 10px 0;
  max-height: 160px;
  letter-spacing: -0.01em;
}
textarea::placeholder{color:var(--text-tertiary)}

.send-btn {
  width: 34px;
  height: 34px;
  background: var(--accent);
  border: none;
  border-radius: 10px;
  color: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  align-self: flex-end;
  margin-bottom: 4px;
  transition: background 0.15s, transform 0.1s, opacity 0.15s;
}
.send-btn:hover{background:#0070e0;transform:scale(1.04)}
.send-btn:active{transform:scale(0.96)}
.send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}

.input-hint {
  text-align: center;
  font-size: 11.5px;
  color: var(--text-tertiary);
  margin-top: 8px;
  letter-spacing: -0.01em;
}

@media(max-width:700px){
  .sidebar{display:none}
  .input-area{padding:12px 16px 16px}
  .msg-group{padding:6px 16px}
}
</style>
</head>
<body>

<div class="shell">
  <div class="sidebar">
    <div class="sidebar-top">
      <div class="traffic-lights">
        <div class="dot red"></div>
        <div class="dot amber"></div>
        <div class="dot green"></div>
      </div>
      <div class="brand">
        <div class="brand-icon">Y</div>
        YE AI
      </div>
      <button class="new-chat" onclick="newChat()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        New Conversation
      </button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-label">Recent</div>
    </div>
    <div class="chat-list" id="chatList"></div>

    <div class="sidebar-footer">
      <div class="model-badge">
        <div class="model-dot"></div>
        <div class="model-name" id="modelName">Loading…</div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="toolbar">
      <div class="toolbar-title">Conversation</div>
      <div class="toolbar-actions">
        <button class="toolbar-btn" title="Clear" onclick="newChat()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
        </button>
      </div>
    </div>

    <div class="chat-area" id="chatArea">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">Y</div>
        <h2>Hello, how can I help?</h2>
        <p>Ask me anything — code, questions, ideas, or just a chat.</p>
      </div>
    </div>

    <div class="input-area">
      <div class="input-card">
        <div class="input-inner">
          <textarea id="msgInput" rows="1" placeholder="Message YE AI…"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
          </button>
        </div>
      </div>
      <div class="input-hint">Return to send · Shift+Return for new line</div>
    </div>
  </div>
</div>

<script>
const API_BASE = "https://reconvene-crease-skintight.ngrok-free.dev/v1";
let currentModel = "qwen2.5-coder-7b-instruct-abliterated";
let messages = [{role:"system",content:"You are a helpful assistant."}];
let isStreaming = false;

const chatArea = document.getElementById("chatArea");
const msgInput = document.getElementById("msgInput");
const sendBtn = document.getElementById("sendBtn");
const welcome = document.getElementById("welcome");

msgInput.addEventListener("input", () => {
  msgInput.style.height = "auto";
  msgInput.style.height = Math.min(msgInput.scrollHeight, 160) + "px";
});

msgInput.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    if (!isStreaming) sendMessage();
  }
});

function hideWelcome() {
  if (welcome) welcome.style.display = "none";
}

function addBubble(role, text) {
  hideWelcome();
  const group = document.createElement("div");
  group.className = "msg-group";
  const isUser = role === "user";
  group.innerHTML = `
    <div class="msg-row ${isUser ? "user" : "ai"}">
      <div class="avatar ${isUser ? "user-avatar" : "ai-avatar"}">${isUser ? "U" : "AI"}</div>
      <div class="bubble">${isUser ? escHtml(text) : marked.parse(text)}</div>
    </div>`;
  chatArea.appendChild(group);
  chatArea.scrollTop = chatArea.scrollHeight;
  return group.querySelector(".bubble");
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || isStreaming) return;
  msgInput.value = "";
  msgInput.style.height = "auto";

  addBubble("user", text);
  messages.push({role:"user", content:text});

  isStreaming = true;
  sendBtn.disabled = true;

  const aiBubble = addBubble("assistant", "");
  aiBubble.innerHTML = '<span class="cursor"></span>';
  let full = "";

  try {
    const res = await fetch(API_BASE + "/chat/completions", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({model:currentModel, messages, stream:true, temperature:0.7})
    });

    const reader = res.body.getReader();
    const dec = new TextDecoder();

    while (true) {
      const {value, done} = await reader.read();
      if (done) break;
      for (const line of dec.decode(value).split("\n")) {
        if (!line.startsWith("data:")) continue;
        const d = line.slice(5).trim();
        if (d === "[DONE]") continue;
        try {
          const tok = JSON.parse(d)?.choices?.[0]?.delta?.content;
          if (tok) {
            full += tok;
            aiBubble.innerHTML = marked.parse(full) + '<span class="cursor"></span>';
            chatArea.scrollTop = chatArea.scrollHeight;
          }
        } catch {}
      }
    }

    aiBubble.innerHTML = marked.parse(full);
    messages.push({role:"assistant", content:full});
    saveChat();
    document.querySelectorAll("pre code").forEach(el => hljs.highlightElement(el));

  } catch (err) {
    aiBubble.innerHTML = '<span style="color:#ff453a;font-size:13px;">⚠ Connection failed. Check your local server.</span>';
  } finally {
    isStreaming = false;
    sendBtn.disabled = false;
  }
}

function saveChat() {
  localStorage.setItem("ye-ai-chat", JSON.stringify(messages));
}

function loadChat() {
  const saved = localStorage.getItem("ye-ai-chat");
  if (!saved) return;
  messages = JSON.parse(saved);
  for (const m of messages) {
    if (m.role === "system") continue;
    addBubble(m.role, m.content);
  }
  document.querySelectorAll("pre code").forEach(el => hljs.highlightElement(el));
}

function newChat() {
  messages = [{role:"system",content:"You are a helpful assistant."}];
  chatArea.innerHTML = "";
  chatArea.appendChild(welcome);
  welcome.style.display = "";
  localStorage.removeItem("ye-ai-chat");
}

async function loadModel() {
  try {
    const res = await fetch(API_BASE + "/models");
    const data = await res.json();
    currentModel = data.data[0].id;
    document.getElementById("modelName").textContent = currentModel;
  } catch {
    document.getElementById("modelName").textContent = "Model unavailable";
    document.querySelector(".model-dot").style.background = "#ff453a";
    document.querySelector(".model-dot").style.boxShadow = "0 0 6px #ff453a";
  }
}

loadModel();
loadChat();
</script>
</body>
</html>
