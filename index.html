<!DOCTYPE html>
<html>
<head>
    <title>LM Studio Chatbot</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
        }

        #chat {
            height: 500px;
            border: 1px solid #ccc;
            padding: 10px;
            overflow-y: auto;
            margin-bottom: 10px;
        }

        .user {
            color: blue;
            margin: 10px 0;
        }

        .bot {
            color: green;
            margin: 10px 0;
        }

        input {
            width: 80%;
            padding: 10px;
        }

        button {
            padding: 10px;
        }
    </style>
</head>
<body>

<h1>LM Studio Chat</h1>

<div id="chat"></div>

<input id="message" placeholder="Type a message...">
<button onclick="sendMessage()">Send</button>

<script>
const messages = [
    {
        role: "system",
        content: "You are a helpful assistant."
    }
];

async function sendMessage() {
    const input = document.getElementById("message");
    const chat = document.getElementById("chat");

    const text = input.value.trim();
    if (!text) return;

    chat.innerHTML += `<div class="user"><b>You:</b> ${text}</div>`;

    messages.push({
        role: "user",
        content: text
    });

    input.value = "";

    try {
        const response = await fetch(
            "http://192.168.50.204:1234/v1/chat/completions",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "huihui-moe-5b-a1.7b-abliterated",
                    messages: messages,
                    temperature: 0.7
                })
            }
        );

        const data = await response.json();

        const reply =
            data.choices[0].message.content;

        messages.push({
            role: "assistant",
            content: reply
        });

        chat.innerHTML +=
            `<div class="bot"><b>Bot:</b> ${reply}</div>`;

        chat.scrollTop = chat.scrollHeight;

    } catch (err) {
        chat.innerHTML +=
            `<div class="bot">Connection failed.</div>`;
        console.error(err);
    }
}
</script>

</body>
</html>
