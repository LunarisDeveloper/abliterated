<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LM Studio Chat</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
:root{
    --bg:#212121;
    --panel:#2f2f2f;
    --user:#303030;
    --assistant:#444654;
    --text:#ececec;
    --border:#3a3a3a;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:Inter,system-ui,sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
}

.app{
    width:100%;
    max-width:900px;
    display:flex;
    flex-direction:column;
    height:100vh;
}

.header{
    height:60px;
    display:flex;
    align-items:center;
    padding:0 20px;
    border-bottom:1px solid var(--border);
    font-weight:600;
}

.chat{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

.message{
    display:flex;
    gap:12px;
    margin-bottom:24px;
}

.avatar{
    width:36px;
    height:36px;
    border-radius:50%;
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:16px;
}

.user-avatar{
    background:#19c37d;
}

.bot-avatar{
    background:#7c3aed;
}

.content{
    line-height:1.6;
    width:100%;
}

.content pre{
    background:#111;
    padding:12px;
    border-radius:10px;
    overflow-x:auto;
}

.content code{
    background:#111;
    padding:2px 6px;
    border-radius:5px;
}

.input-area{
    padding:20px;
    border-top:1px solid var(--border);
}

.input-box{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:18px;
    display:flex;
    align-items:flex-end;
    padding:10px;
}

textarea{
    flex:1;
    background:none;
    border:none;
    resize:none;
    color:white;
    font-size:16px;
    outline:none;
    max-height:200px;
}

button{
    background:#19c37d;
    border:none;
    color:white;
    padding:10px 18px;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
}

button:hover{
    opacity:.9;
}

.typing{
    opacity:.6;
    animation:pulse 1.2s infinite;
}

@keyframes pulse{
    0%{opacity:.4}
    50%{opacity:1}
    100%{opacity:.4}
}
</style>
</head>

<body>

<div class="app">

    <div class="header">
        LM Studio Assistant
    </div>

    <div id="chat" class="chat"></div>

    <div class="input-area">
        <div class="input-box">
            <textarea
                id="message"
                rows="1"
                placeholder="Message assistant..."
            ></textarea>

            <button onclick="sendMessage()">
                Send
            </button>
        </div>
    </div>

</div>

<script>

const chat = document.getElementById("chat");
const textarea = document.getElementById("message");

const messages = [
{
    role:"system",
    content:"You are a helpful assistant."
}
];

textarea.addEventListener("input", () => {
    textarea.style.height = "auto";
    textarea.style.height = textarea.scrollHeight + "px";
});

textarea.addEventListener("keydown",(e)=>{
    if(e.key==="Enter" && !e.shiftKey){
        e.preventDefault();
        sendMessage();
    }
});

function addMessage(role,text){

    const div = document.createElement("div");
    div.className = "message";

    const avatar =
        role==="user"
        ? "🧑"
        : "🤖";

    div.innerHTML = `
        <div class="avatar ${
            role==="user"
            ? "user-avatar"
            : "bot-avatar"
        }">
            ${avatar}
        </div>

        <div class="content">
            ${marked.parse(text)}
        </div>
    `;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;

    return div;
}

async function sendMessage(){

    const text = textarea.value.trim();

    if(!text) return;

    addMessage("user",text);

    messages.push({
        role:"user",
        content:text
    });

    textarea.value="";
    textarea.style.height="auto";

    const typing = addMessage(
        "assistant",
        "<span class='typing'>Thinking...</span>"
    );

    try{

        const response = await fetch(
            "http://192.168.50.204:1234/v1/chat/completions",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    model:"mlabonne-daredevil-8b-abliterated",
                    messages,
                    temperature:0.7
                })
            }
        );

        const data = await response.json();

        const reply =
            data.choices[0].message.content;

        messages.push({
            role:"assistant",
            content:reply
        });

        typing.querySelector(".content").innerHTML =
            marked.parse(reply);

        chat.scrollTop = chat.scrollHeight;

    }
    catch(err){

        typing.querySelector(".content").innerHTML =
            "Connection failed.";

        console.error(err);
    }
}
</script>

</body>
</html>
